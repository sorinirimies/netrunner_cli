name: Update README and CHANGELOG

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Install git-cliff
        run: |
          wget -q https://github.com/orhun/git-cliff/releases/download/v2.4.0/git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz
          tar -xzf git-cliff-2.4.0-x86_64-unknown-linux-gnu.tar.gz
          sudo mv git-cliff-2.4.0/git-cliff /usr/local/bin/
          git-cliff --version

      - name: Update README.md and CHANGELOG.md
        run: nu scripts/update_docs.nu ${{ github.ref_name }}

      - name: Check if files were modified
        id: check_changes
        run: |
          if git diff --quiet README.md CHANGELOG.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes to documentation files"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Documentation files updated"
          fi

      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add README.md CHANGELOG.md
          git commit -m "docs: update README and CHANGELOG for ${{ github.ref_name }}

          - Update README version badge
          - Generate CHANGELOG with git-cliff"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success message
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          echo "✅ Documentation updated for ${{ github.ref_name }}"
          echo "  - README.md version badge"
          echo "  - CHANGELOG.md generated"

      - name: No changes message
        if: steps.check_changes.outputs.changed == 'false'
        run: |
          echo "ℹ️ Documentation already up to date"
